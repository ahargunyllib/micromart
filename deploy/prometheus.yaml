global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "order-service"
    static_configs:
      - targets: ["host.docker.internal:8080"] # TODO: replace with actual order service host:port

  - job_name: "inventory-service"
    static_configs:
      - targets: ["host.docker.internal:8081"] # TODO: replace with actual inventory service host:port
